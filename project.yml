name: Claustra
options:
  bundleIdPrefix: com.claustra
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

targets:
  Claustra:
    type: application
    platform: macOS
    sources:
      - Claustra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claustra.app
        PRODUCT_NAME: Claustra
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Claustra/Info.plist
        CODE_SIGN_ENTITLEMENTS: Claustra/Claustra.entitlements
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        COMBINE_HIDPI_IMAGES: YES
